<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor de Cuba - Bizcochos y Dulces</title>
</head>
<body style="background-color: #FFFFFF; color: #333; font-family: 'Times New Roman', Times, serif; text-align: center; margin: 0; padding: 0;">

    <header style="padding: 50px 20px;">
        <h1 style="color: #4682B4; font-size: 3.5em; margin: 0; display: inline; text-transform: uppercase;">
            <span style="color: #4682B4;">Sabor</span> de <span style="color: #4682B4;">Cuba</span>
        </h1>
        <p style="color: #8B4513; font-size: 1.5em; font-weight: normal; margin-top: 10px;">Bizcochos, dulces y tablas de queso</p>
    </header>

    <div style="border-top: 2px solid #CD853F; border-bottom: 2px solid #CD853F; padding: 20px 0; margin-top: 20px;">
        
        <div style="display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;">
            
            <div style="border: 1px solid #ddd; padding: 15px; border-radius: 5px; max-width: 300px; text-align: center;">
                <img src="tarta%20rosa.png" alt="Tarta Rosa" style="width: 100%; border-radius: 5px;">
                <p style="color: #FF1493; font-weight: bold; margin-top: 10px;">Repostería Fina</p>
            </div>

            <div style="border: 1px solid #ddd; padding: 15px; border-radius: 5px; max-width: 300px; text-align: center;">
                <img src="tarta%20azul.png" alt="Tarta Azul" style="width: 100%; border-radius: 5px;">
                <p style="color: #1E90FF; font-weight: bold; margin-top: 10px;">Diseños Especiales</p>
            </div>

            <div style="border: 1px solid #ddd; padding: 15px; border-radius: 5px; max-width: 300px; text-align: center;">
                <img src="tabla.png" alt="Tabla Gourmet" style="width: 100%; border-radius: 5px;">
                <p style="color: #FF8C00; font-weight: bold; margin-top: 10px;">Tablas Gourmet</p>
            </div>

        </div>
    </div>

    <footer style="color: #D2B48C; padding: 30px; margin-top: 50px;">
        <p style="font-size: 1.2em; margin: 0;">Hecho con amor por Sabor de Cuba</p>
    </footer>

</body>
</html>
