<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor de Cuba</title>
</head>
<body style="background-color: #FFFFFF; color: #333; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding: 0;">

    <header style="background-color: #FFF0F5; padding: 50px 20px; border-bottom: 6px solid #FF1493;">
        <h1 style="color: #FF1493; font-size: 3.5em; margin: 0; text-shadow: 1px 1px #eee;">SABOR DE CUBA</h1>
        <p style="color: #FF8C00; font-size: 1.5em; font-style: italic; margin-top: 10px; font-weight: bold;">¡El rincón más dulce y sabroso!</p>
    </header>

    <main style="padding: 40px 15px;">
        <h2 style="color: #5D4037; font-size: 2em; margin-bottom: 40px; border-bottom: 2px solid #FFD700; display: inline-block; padding-bottom: 10px;">Nuestras Especialidades</h2>

        <div style="display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;">
            
            <div style="background: white; padding: 15px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 2px solid #FF1493; max-width: 300px;">
                <img src="tarta%20rosa.png" style="width: 100%; border-radius: 15px;">
                <h3 style="color: #FF1493; margin-top: 15px;">Repostería Fina</h3>
            </div>

            <div style="background: white; padding: 15px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 2px solid #00BFFF; max-width: 300px;">
                <img src="tarta%20azul.png" style="width: 100%; border-radius: 15px;">
                <h3 style="color: #00BFFF; margin-top: 15px;">Diseños Especiales</h3>
            </div>

            <div style="background: white; padding: 15px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border: 2px solid #FF8C00; max-width: 300px;">
                <img src="tabla.png" style="width: 100%; border-radius: 15px;">
                <h3 style="color: #FF8C00; margin-top: 15px;">Tablas Gourmet</h3>
            </div>

        </div>
    </main>

    <footer style="background-color: #FF1493; color: white; padding: 30px; margin-top: 50px;">
        <p style="font-size: 1.2em; margin: 0;">✨ Hecho con amor por Sabor de Cuba ✨</p>
    </footer>

</body>
</html>
